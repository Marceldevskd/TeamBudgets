services:
  db:
    image: postgres:latest
    environment: 
      POSTGRES_USER: ${DB_USER:-username}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mydatabase}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
      - ./database/schemas/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./database/seeders/init.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro

  backend: 
    image: node:latest
    working_dir: /app
    depends_on:
      - db
    volumes:
      - ./:/app 
      - /app/node_modules
    ports:
      - "9001:9001"
    environment:
      DATABASE_URL: postgres://${DB_USER:-username}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mydatabase}
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
